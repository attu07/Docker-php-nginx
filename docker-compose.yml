version: '3'

services:
  php-fpm:
    image: php:7.4-fpm
    container_name: php71-fpm
    volumes:
      - ./src:/var/www/html
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    container_name: nginx-php71
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - php-fpm
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
